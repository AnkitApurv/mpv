############################################################
# 🎛️ MPV GLOBAL CONFIG (3-PROFILE SYSTEM)
# Default: PERCEPTUAL (enhanced visuals)
############################################################

############################################################
# 🌟 DEFAULT PROFILE → PERCEPTUAL
############################################################

[default]
profile=perceptual


############################################################
# 🔧 EXTERNAL TOOLS
############################################################

ffmpeg_path=ffmpeg
alass_path=alass-cli
subliminal_path=subliminal


############################################################
# ⚙️ CORE PIPELINE (COMMON BASE)
############################################################

vo=gpu-next
gpu-api=vulkan
hwdec=auto-copy

gpu-shader-cache=yes
display-fps-override=auto

############################################################
#    Auto-Resume Playback
############################################################

save-position-on-quit=yes

[don't save position on quit]
profile-cond=eof_reached
save-position-on-quit=no


############################################################
# 📝 SUBTITLES (FULL libass PIPELINE)
############################################################

sub-ass=yes
sub-auto=fuzzy
sub-ass-override=no

blend-subtitles=yes
sub-scale-by-window=yes
sub-use-margins=yes


############################################################
# 🌈 HDR + COLOR (ACCURATE)
############################################################

target-colorspace-hint=yes

tone-mapping=mobius
tone-mapping-mode=auto

hdr-compute-peak=yes
hdr-peak-percentile=99.9
hdr-contrast-recovery=0.3

gamut-mapping-mode=perceptual
icc-profile-auto=yes


############################################################
# 💾 CACHE
############################################################

cache=yes
demuxer-max-bytes=512M
demuxer-max-back-bytes=128M


############################################################
# 🔁 AUTOSYNC SUB
############################################################

audio_subsync_tool=alass
altsub_subsync_tool=alass
unload_old_sub=yes
overwrite_old_sub=yes


############################################################
# 🖥️ UI
############################################################

# start in full screen mode
fs=yes

# uosc provides seeking & volume indicators (via flash-timeline and flash-volume commands)
# if you decide to use them, you don't need osd-bar
osd-bar=no

# uosc will draw its own window controls and border if you disable window border
border=no


############################################################
# PROFILES
############################################################


############################################################
# 🎯 PROFILE 1: REFERENCE (GROUND TRUTH)
############################################################

[reference]

profile-restore=copy
profile-desc=Reference quality (no artificial enhancement)

video-sync=audio
interpolation=no

scale=ewa_lanczossharp
cscale=ewa_lanczossharp
dscale=mitchell
scale-clamp=0.0

sigmoid-upscaling=no
correct-downscaling=yes

deband=yes
deband-iterations=2
deband-threshold=20
deband-range=16
deband-grain=4

dither-depth=auto
dither=error-diffusion


############################################################
# 🎨 PROFILE 2: PERCEPTUAL (DEFAULT)
############################################################

[perceptual]

profile-restore=copy
profile-desc=Perceptual enhancement (better visuals)

video-sync=display-resample
interpolation=yes

tscale=sphinx

scale=ewa_lanczossharp
cscale=ewa_lanczossharp
dscale=mitchell
scale-clamp=0.0

sigmoid-upscaling=yes
correct-downscaling=yes

deband=yes
deband-iterations=3
deband-threshold=28
deband-range=16
deband-grain=8

dither-depth=auto
dither=error-diffusion


############################################################
# 🔋 PROFILE 3: LOW-POWER
############################################################

[low-power]

profile-restore=copy
profile-desc=Low power (efficiency prioritized)

# Minimal scaling cost
scale=bilinear
cscale=bilinear
dscale=bilinear

# Disable heavy processing
deband=no
sigmoid-upscaling=no

# Simpler sync
video-sync=audio
interpolation=no
