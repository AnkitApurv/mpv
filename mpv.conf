############################################################
# 🎛️ MPV GLOBAL CONFIG (3-PROFILE SYSTEM)
# Default: PERCEPTUAL (enhanced visuals)
############################################################

############################################################
# 🌟 DEFAULT PROFILE → PERCEPTUAL
############################################################

[default]
profile=perceptual


############################################################
# 🔧 EXTERNAL TOOLS
############################################################

ffmpeg_path='C:/Users/ankit/AppData/Local/Microsoft/WinGet/Packages/Gyan.FFmpeg.Shared_Microsoft.Winget.Source_8wekyb3d8bbwe/ffmpeg-7.1-full_build-shared/bin/ffmpeg.exe'
alass_path='C:/Program Files/alass/bin/alass-cli.exe'
subliminal_path='C:/Users/ankit/AppData/Local/Programs/Python/Python313/Scripts/subliminal.exe'


############################################################
# ⚙️ CORE PIPELINE (COMMON BASE)
############################################################

vo=gpu-next
gpu-api=vulkan
gpu-context=auto
hwdec=auto-safe

############################################################
# 📝 SUBTITLES (FULL libass PIPELINE)
############################################################

sub-ass=yes
sub-auto=fuzzy
sub-ass-override=no

blend-subtitles=yes
sub-scale-by-window=yes
sub-use-margins=yes


############################################################
# 🌈 HDR + COLOR (ACCURATE)
############################################################

target-colorspace-hint=yes
tone-mapping=bt.2446a
tone-mapping-mode=auto
hdr-compute-peak=yes
hdr-peak-percentile=99.995
gamut-mapping-mode=perceptual
icc-profile-auto=yes


############################################################
# 💾 CACHE
############################################################

cache=yes
demuxer-max-bytes=6144M
demuxer-max-back-bytes=1024M


############################################################
# 🔁 AUTOSYNC SUB
############################################################

audio_subsync_tool=alass
altsub_subsync_tool=alass
unload_old_sub=yes
overwrite_old_sub=yes


############################################################
# 🖥️ UI
############################################################

fs=yes
osd-bar=no
border=no


############################################################
# PROFILES
############################################################


############################################################
# 🎯 PROFILE 1: REFERENCE (GROUND TRUTH)
############################################################

[reference]

profile-restore=copy
profile-desc=Reference quality (no artificial enhancement)

# Timing (preserve original motion)
video-sync=display-resample
interpolation=no

# High-quality neutral scaling
scale=ewa_lanczossharp
cscale=ewa_lanczossharp
dscale=mitchell

linear-upscaling=yes
correct-downscaling=yes
sigmoid-upscaling=yes

# Balanced debanding (artifact removal only)
deband=yes
deband-iterations=2
deband-threshold=28
deband-range=16
deband-grain=4

# Output stability
correct-pts=yes
dither-depth=auto
temporal-dither=yes


############################################################
# 🎨 PROFILE 2: PERCEPTUAL (DEFAULT)
############################################################

[perceptual]

profile-restore=copy
profile-desc=Perceptual enhancement (better visuals)

# Timing + smoothness
video-sync=display-resample
interpolation=yes

tscale=oversample
tscale-window=blackman
tscale-radius=1.0

# Sharper scaling
scale=ewa_lanczossharp
cscale=ewa_lanczossharp
dscale=mitchell

linear-upscaling=yes
sigmoid-upscaling=yes
correct-downscaling=yes

# Stronger debanding
deband=yes
deband-iterations=4
deband-threshold=32
deband-range=16
deband-grain=6

# Output quality
correct-pts=yes
dither-depth=auto
temporal-dither=yes


############################################################
# 🔋 PROFILE 3: LOW-POWER
############################################################

[low-power]

profile-restore=copy
profile-desc=Low power (efficiency prioritized)

# Minimal scaling cost
scale=bilinear
cscale=bilinear
dscale=bilinear

# Disable heavy processing
deband=no
sigmoid-upscaling=no
linear-upscaling=no

# Simpler sync
video-sync=audio
interpolation=no
